<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
<script>
// POST via XMLHttpRequest, following the 302 redirect that Google Apps Script returns.
// XHR follows redirects automatically and works reliably in iOS WKWebView.
function postToWebhook(url, body) {
  return new Promise(function(resolve, reject) {
    var xhr = new XMLHttpRequest();
    xhr.open('POST', url, true);
    xhr.setRequestHeader('Content-Type', 'text/plain');
    xhr.onload = function() {
      if (xhr.status >= 200 && xhr.status < 400) {
        resolve(xhr.responseText);
      } else {
        reject(new Error('HTTP ' + xhr.status + ': ' + xhr.statusText));
      }
    };
    xhr.onerror = function() {
      reject(new Error('Network error (XHR). Check that the webhook URL is correct and reachable.'));
    };
    xhr.ontimeout = function() {
      reject(new Error('Request timed out after 15s.'));
    };
    xhr.timeout = 15000;
    xhr.send(body);
  });
}

window['ai_edge_gallery_get_result'] = async function(data, secret) {
  try {
    var payload = JSON.parse(data);
    var url = (secret || '').trim();

    if (!url) {
      return JSON.stringify({ error: 'Secret not set. Paste your Google Apps Script Web App URL as the skill secret.' });
    }

    var body = JSON.stringify(payload);
    var responseText = await postToWebhook(url, body);

    var result;
    try {
      result = JSON.parse(responseText);
    } catch (e) {
      // Response wasn't JSON — return a snippet so we can diagnose
      return JSON.stringify({ error: 'Unexpected response (not JSON): ' + responseText.substring(0, 200) });
    }

    if (result.error) {
      return JSON.stringify({ error: 'Apps Script error: ' + result.error });
    }

    return JSON.stringify({
      result: 'Logged: ' + payload.date + ' | €' + payload.amount + ' | ' + payload.category + ' | ' + payload.description
    });

  } catch (e) {
    return JSON.stringify({ error: 'JS error: ' + e.message });
  }
};
</script>
</body>
</html>
